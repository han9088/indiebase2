# Local development: `docker compose up -d` (loads `.env` automatically).
# Secrets: POSTGRES_PASSWORD / REDIS_PASSWORD from `.env` → Compose v2.23+ secret provider.

x-logging: &x-logging
  logging:
    driver: 'json-file'
    options:
      max-file: '5'
      max-size: '10m'

services:
  postgres:
    image: postgres:17.4-alpine3.21
    <<: *x-logging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: ${PGDATA}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE}
    volumes:
      - pg_data:/var/lib/postgresql/data/pgdata
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
    secrets:
      - pg_password

  redis:
    image: redis:6.2.6-alpine
    <<: *x-logging
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data:rw
      - ${CONFIG_DIR}/redis:/usr/local/etc/redis:ro
    secrets:
      - redis_password
    entrypoint: ['/bin/sh', '-c']
    command:
      - 'exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$$(cat /run/secrets/redis_password | tr -d "\n\r")"'

  postgrest:
    image: postgrest/postgrest
    <<: *x-logging
    restart: unless-stopped
    ports:
      - 13000:3000
    volumes:
      - ./docker/postgrest/entrypoint.sh:/entrypoint.sh:ro
    secrets:
      - pg_password
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    environment:
      PGRST_OPENAPI_SERVER_PROXY_URI: ${PGRST_OPENAPI_SERVER_PROXY_URI}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE}
    depends_on:
      - postgres

volumes:
  pg_data:
  redis_data:

secrets:
  pg_password:
    environment: POSTGRES_PASSWORD
  redis_password:
    environment: REDIS_PASSWORD
