# Local development: `docker compose --env-file .env.development up -d`

x-logging: &x-logging
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "10m"

services:
  postgres:
    image: postgres:17.4-alpine3.21
    <<: *x-logging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: ${PGDATA}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE}
    volumes:
      - pg_data:/var/lib/postgresql/data/pgdata
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT}:5432"
    secrets:
      - pg_password

  redis:
    image: redis:6.2.6-alpine
    <<: *x-logging
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data:rw
      - ${CONFIG_DIR}/redis:/usr/local/etc/redis:ro
    secrets:
      - redis_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$$(cat /run/secrets/redis_password | tr -d "\n\r")"'

  postgrest:
    image: postgrest/postgrest
    <<: *x-logging
    restart: unless-stopped
    ports:
      - "${POSTGREST_PORT}:3000"
    volumes:
      # Entrypoint writes minimal conf (db-uri / jwt / pre-config / pre-request).
      # Schema list is dynamic via public.indiebase_pre_config + NOTIFY reload.
      - ./docker/postgrest:/config
    secrets:
      - pg_password
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGRST_DB_HOST: ${PGRST_DB_HOST}
      PGRST_DB_PORT: "5432"
      PGRST_OPENAPI_SERVER_PROXY_URI: ${PGRST_OPENAPI_SERVER_PROXY_URI}
      # Do NOT set PGRST_DB_SCHEMAS: in-DB pre_config sets pgrst.db_schemas from projects.
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE}
      # Must match API POSTGREST_JWT_SECRET (authenticator JWT HS256).
      POSTGREST_JWT_SECRET: ${POSTGREST_JWT_SECRET}
    depends_on:
      - postgres

volumes:
  pg_data:
  redis_data:

secrets:
  pg_password:
    environment: POSTGRES_PASSWORD
  redis_password:
    environment: REDIS_PASSWORD
