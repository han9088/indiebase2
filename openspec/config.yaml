schema: spec-driven

context: |
  Project: Indiebase — self-hosted BaaS for indie developers and small teams.
  Stack: Rust (Cargo workspace) — Axum, sqlx, SeaQuery, OpenDAL, ulid; Postgres 17, Redis, PostgREST.
  Manager API: Dashboard platform/admin routes (/api/projects, /api/tables, /api/auth/*, …); NOT /api/data/*.
  Data API: CRUD gateway (/api/data/*), PostgREST proxy, separate from Manager API; Dashboard Session or SDK API Key.
  MVP TS SDK: see docs/prd/mvp-sdk.md — @supabase/postgrest-js thin wrapper; /api/data/{projectId} + API Key.
  Project API Key: SDK authentication/authorization only — does NOT resolve project context.
  Isolation: schema-per-project as proj_{ulid}; platform tables in public schema.
  Auth: no JWT. Dashboard + Project login: Opaque Token + Redis.
  Optional object storage: SeaweedFS S3 under docker/seaweedfs/ (separate compose, not in root stack).
  Local infra: `docker compose --env-file .env.development up -d`; Vite-style env modes via INDIEBASE_MODE.
  Lint/format: `cargo fmt`, `cargo clippy`; tests via `cargo test`.
  Tests/PRD: optional guidance (see `.cursor/rules/backend-tdd-prd.mdc`); not required before every edit.
  Docs language: reply to users in Simplified Chinese; source code, comments, and commit messages in English.
  OpenSpec: optional — only when the user asks for OPSX; then explore → propose → apply → sync → archive.
  Brownfield: delta specs only; do not back-fill specs for untouched code.

rules:
  proposal:
    - Keep proposals under 800 words; include Non-goals
    - One logical change per proposal; split large scope into follow-up changes
  design:
    - Match existing Rust module boundaries and Docker layout
    - Call out Postgres schema / PostgREST / RLS impacts when touching data
  tasks:
    - Break into chunks that can be verified independently
    - TDD order: failing test task before implementation task for each behavior
    - Include PRD sync task when product behavior or acceptance criteria change
    - Include `cargo test` / `cargo clippy` verification steps where relevant
  specs:
    - Use Given/When/Then scenarios
    - Reference existing patterns in repo before inventing new abstractions
